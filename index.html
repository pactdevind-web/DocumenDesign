<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>FormFlow – Layout Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#2563eb;--blue-light:#eff4ff;--blue-mid:#bfcffb;
  --red:#ef4444;--green:#059669;--amber:#d97706;--purple:#7c3aed;--pink:#db2777;
  --g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
  --g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;
  --g800:#1e293b;--g900:#0f172a;--white:#fff;
  --rsm:6px;--r:10px;--rlg:14px;
  --ssm:0 1px 3px rgba(0,0,0,.08);--s:0 4px 16px rgba(0,0,0,.10);--slg:0 8px 32px rgba(0,0,0,.16);
  --f:'DM Sans',sans-serif;--t:.16s ease;
}

/* ─── RESET / BASE ─────────────────────────────────────────── */
body{font-family:var(--f);background:var(--g50);color:var(--g900);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:14px}

/* ─── TOPBAR ───────────────────────────────────────────────── */
.topbar{height:52px;background:var(--white);border-bottom:1px solid var(--g200);display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;z-index:200}
.t-logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.t-bc{display:flex;align-items:center;gap:6px;color:var(--g500);font-size:13px}
.t-bc span{color:var(--g900);font-weight:500}
.t-sep{color:var(--g300)}
.t-sp{flex:1}
.btn-prev{display:flex;align-items:center;gap:6px;padding:7px 14px;border:1px solid var(--g200);border-radius:var(--rsm);background:var(--white);color:var(--g700);font-family:var(--f);font-size:13px;font-weight:500;cursor:pointer;transition:var(--t)}
.btn-prev:hover{background:var(--g100)}
.btn-pub{padding:7px 18px;border:none;border-radius:var(--rsm);background:var(--blue);color:var(--white);font-family:var(--f);font-size:13px;font-weight:600;cursor:pointer;transition:var(--t)}
.btn-pub:hover{background:#1d4ed8}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:white}

/* ─── WORKSPACE ────────────────────────────────────────────── */
.workspace{flex:1;display:grid;grid-template-columns:52px 244px 1fr 272px;overflow:hidden}

/* ─── RAIL ─────────────────────────────────────────────────── */
.col-rail{background:var(--white);border-right:1px solid var(--g200);display:flex;flex-direction:column;align-items:center;padding:16px 0;gap:6px}
.ri{width:36px;height:36px;border-radius:var(--rsm);display:flex;align-items:center;justify-content:center;color:var(--g500);cursor:pointer;transition:var(--t)}
.ri:hover{background:var(--blue-light);color:var(--blue)}
.ri.active{background:var(--blue);color:white}
.rsp{flex:1}

/* ─── SIDEBAR ──────────────────────────────────────────────── */
.col-comp{background:var(--white);border-right:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden}
/* Two-tab header */
.sb-tabs{display:flex;border-bottom:1px solid var(--g200);flex-shrink:0}
.sb-tab{flex:1;padding:11px 6px;text-align:center;font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--g400);cursor:pointer;border-bottom:2px solid transparent;transition:var(--t)}
.sb-tab:hover{color:var(--g700)}
.sb-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
/* Panels inside sidebar */
.sb-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.sb-panel.active{display:flex}
/* Components panel (original style) */
.comp-hdr{padding:14px 14px 8px;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--g400);text-transform:uppercase;flex-shrink:0}
.comp-list{padding:6px 10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.comp-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--g200);border-radius:var(--r);background:var(--white);cursor:grab;transition:var(--t);user-select:none}
.comp-item:hover{border-color:var(--blue-mid);background:var(--blue-light);box-shadow:var(--ssm)}
.comp-item.is-dragging{opacity:.3}
.ci{width:34px;height:34px;border-radius:var(--rsm);background:var(--g100);display:flex;align-items:center;justify-content:center;color:var(--g600);flex-shrink:0}
.cn{font-size:13px;font-weight:600;color:var(--g800)}
.cd{font-size:11px;color:var(--g400);margin-top:1px}
/* Structure tree panel */
.str-tree{padding:8px 10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.str-zone{border:1px solid var(--g200);border-radius:var(--r);overflow:hidden}
.str-zone-hdr{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--g50);cursor:pointer}
.str-zone-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.str-zone-title{font-size:12px;font-weight:700;color:var(--g800);flex:1}
.str-zone-count{font-size:10px;color:var(--g400)}
.str-zone-add{margin-left:4px;width:18px;height:18px;border:1px dashed var(--g300);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--g400);cursor:pointer;transition:var(--t);line-height:1}
.str-zone-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.str-items{padding:4px 8px 6px;display:flex;flex-direction:column;gap:2px;border-top:1px solid var(--g100)}
.str-item{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;font-size:11px;font-weight:500;color:var(--g600);cursor:pointer;transition:var(--t)}
.str-item:hover{background:var(--blue-light);color:var(--blue)}
.str-item.active{background:var(--blue-light);color:var(--blue);font-weight:600}
.str-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.str-item-del{margin-left:auto;font-size:10px;opacity:0;transition:var(--t)}
.str-item:hover .str-item-del{opacity:1}
.str-add-row{display:flex;align-items:center;gap:4px;padding:5px 8px;color:var(--g400);font-size:11px;cursor:pointer;border:1px dashed var(--g200);border-radius:6px;transition:var(--t)}
.str-add-row:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light)}

/* ─── CANVAS ───────────────────────────────────────────────── */
.col-canvas{background:var(--g50);overflow-y:auto;padding:28px 32px;background-image:radial-gradient(var(--g300) 1px,transparent 1px);background-size:22px 22px}
.cv-card{background:var(--white);border:1px solid var(--g200);border-radius:var(--rlg);box-shadow:var(--s);min-height:600px;overflow:hidden}

/* Card title bar */
.cv-hdr{padding:22px 26px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px}
.cv-title{font-size:20px;font-weight:700;color:var(--g900);flex:1;outline:none}
.cv-status{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:#dcfce7;color:#166534}

/* ─── LAYOUT ZONE WRAPPER ──────────────────────────────────── */
/* Each zone (Header / Body / Footer) has this container */
.lz{border-top:1px solid var(--g200)}
.lz:first-of-type{border-top:none}

/* Zone collapse bar */
.lz-bar{display:flex;align-items:center;gap:10px;padding:9px 20px;background:var(--g50);cursor:pointer;user-select:none;border-bottom:1px solid var(--g200);transition:var(--t)}
.lz-bar:hover{background:var(--g100)}
.lz-badge{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white;flex-shrink:0;letter-spacing:0}
.lz-name{font-size:12px;font-weight:700;color:var(--g700);flex:1}
.lz-meta{font-size:11px;color:var(--g400)}
.lz-actions{display:flex;gap:5px}
.lz-btn{padding:3px 9px;border:1px solid var(--g200);border-radius:4px;background:var(--white);color:var(--g500);font-family:var(--f);font-size:11px;font-weight:500;cursor:pointer;transition:var(--t)}
.lz-btn:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light)}
.lz-chevron{color:var(--g400);transition:transform .2s}
.lz-bar.collapsed .lz-chevron{transform:rotate(-90deg)}
.lz-body{overflow:hidden}
.lz-bar.collapsed+.lz-body{display:none}

/* ─── HEADER ZONE: sub-sections as tabs ────────────────────── */
.hz-tabs{display:flex;align-items:center;gap:0;border-bottom:1px solid var(--g200);background:var(--white);padding:0 20px}
.hz-tab{padding:9px 15px;font-size:13px;font-weight:500;color:var(--g500);cursor:pointer;border-bottom:2px solid transparent;transition:var(--t);white-space:nowrap;position:relative}
.hz-tab:hover{color:var(--g800)}
.hz-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.hz-tab .tab-del{display:none;position:absolute;top:4px;right:2px;width:13px;height:13px;border-radius:50%;background:var(--red);color:white;font-size:8px;align-items:center;justify-content:center;cursor:pointer;line-height:1}
.hz-tab:hover .tab-del{display:flex}
.hz-tab-add{padding:8px 10px;color:var(--g400);cursor:pointer;font-size:16px;line-height:1;transition:var(--t)}
.hz-tab-add:hover{color:var(--blue)}
/* Section content (fields) */
.hz-sec{display:none;padding:14px 20px 6px}
.hz-sec.active{display:block}

/* ─── ORIGINAL FORM-ROW / CELL / CARD (unchanged from original) */
.form-row{display:flex;flex-direction:column;margin-bottom:10px;position:relative}
.row-tb{display:flex;align-items:center;gap:6px;margin-bottom:5px;opacity:0;transition:var(--t);min-height:22px}
.form-row:hover .row-tb{opacity:1}
.rl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400)}
.rsp2{flex:1}
.rbtn{display:flex;align-items:center;gap:4px;padding:3px 8px;border:1px solid var(--g200);border-radius:4px;background:var(--white);color:var(--g500);font-family:var(--f);font-size:11px;font-weight:500;cursor:pointer;transition:var(--t)}
.rbtn:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light)}
.rbtn.danger:hover{border-color:#fca5a5;color:var(--red);background:#fff5f5}
.row-inner{display:grid;gap:10px;position:relative}
.row-drop-ind{height:3px;border-radius:2px;background:var(--blue);margin-bottom:8px;opacity:0;transition:opacity .1s;pointer-events:none}
.row-drop-ind.active{opacity:1}
.field-cell{position:relative;min-height:92px}
.cell-empty-tgt{position:absolute;inset:0;border:2px dashed var(--blue-mid);border-radius:var(--r);background:rgba(37,99,235,.03);display:flex;align-items:center;justify-content:center;color:var(--g400);font-size:12px;font-weight:500;transition:var(--t);pointer-events:none;opacity:0}
.field-cell.is-empty .cell-empty-tgt{opacity:1;pointer-events:all}
.field-cell.drag-over .cell-empty-tgt{border-color:var(--blue);background:var(--blue-light);color:var(--blue);opacity:1}
.field-card{border:2px solid transparent;border-radius:var(--r);background:var(--white);padding:14px 14px 10px;cursor:pointer;transition:var(--t);position:relative;user-select:none}
.field-card:hover{border-color:var(--blue-mid)}
.field-card.selected{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.field-card.field-dragging{opacity:.3}
.card-handle{position:absolute;top:7px;left:50%;transform:translateX(-50%);color:var(--g300);cursor:grab;opacity:0;transition:var(--t)}
.field-card:hover .card-handle{opacity:1}
.fc-label{font-size:13px;font-weight:600;color:var(--g700);margin-bottom:8px}
.fc-input{width:100%;padding:8px 11px;border:1px solid var(--g200);border-radius:var(--rsm);font-family:var(--f);font-size:13px;color:var(--g400);background:var(--white);outline:none;pointer-events:none}
.fc-badge{display:inline-flex;align-items:center;gap:4px;margin-top:7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.fc-del{position:absolute;top:-9px;right:-9px;width:24px;height:24px;border-radius:50%;background:var(--red);border:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--t);font-size:11px;z-index:10}
.field-card:hover .fc-del,.field-card.selected .fc-del{opacity:1}
.fc-del:hover{background:#dc2626;transform:scale(1.12)}
/* Section drop zone */
.sec-drop-zone{border:2px dashed var(--blue-mid);border-radius:var(--r);background:rgba(37,99,235,.02);min-height:72px;margin-top:4px;margin-bottom:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--blue);font-size:12px;font-weight:500;transition:var(--t)}
.sec-drop-zone.drag-over,.sec-drop-zone:hover{border-color:var(--blue);background:var(--blue-light);box-shadow:0 0 0 3px rgba(37,99,235,.07)}
.drop-plus{width:26px;height:26px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:300}

/* ─── GRID / BODY ZONE ─────────────────────────────────────── */
.grid-wrap{padding:0;overflow-x:auto}
.grid-outer{min-width:100%;display:flex;flex-direction:column}
/* column header row */
.grid-head{display:flex;align-items:stretch;background:var(--g50);border-bottom:2px solid var(--g200);position:sticky;top:0;z-index:10}
.grid-rn-hd{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--g200);font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase}
.grid-col-th{flex:1;min-width:90px;display:flex;align-items:center;gap:6px;padding:8px 10px;border-right:1px solid var(--g200);font-size:11px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:var(--t);position:relative;user-select:none}
.grid-col-th:hover{background:var(--blue-light);color:var(--blue)}
.grid-col-th.sel{background:var(--blue-light);color:var(--blue);border-bottom:2px solid var(--blue);margin-bottom:-2px}
.grid-col-th.col-drag-over{border-left:3px solid var(--blue);background:var(--blue-light)}
.grid-col-th .col-th-del{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--red);color:white;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--t)}
.grid-col-th:hover .col-th-del{opacity:1}
.grid-col-th .col-th-drag{color:var(--g300);font-size:10px;cursor:grab;opacity:0;margin-right:4px}
.grid-col-th:hover .col-th-drag{opacity:1}
.grid-col-th-add{padding:8px 14px;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g400);cursor:pointer;white-space:nowrap;transition:var(--t);border-right:none}
.grid-col-th-add:hover{color:var(--blue);background:var(--blue-light)}
/* grid data rows */
.grid-rows{display:flex;flex-direction:column}
.grid-row{display:flex;align-items:stretch;border-bottom:1px solid var(--g100)}
.grid-row:hover{background:rgba(37,99,235,.015)}
.grid-rn{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--g100);font-size:11px;color:var(--g400);background:var(--g50)}
.grid-cell{flex:1;min-width:90px;padding:7px 10px;border-right:1px solid var(--g100);min-height:36px;display:flex;align-items:center;font-size:12px;color:var(--g700);transition:var(--t);cursor:pointer;position:relative}
.grid-cell:hover,.grid-cell.sel{background:rgba(37,99,235,.04)}
.grid-cell.drop-tgt{background:var(--blue-light);border:2px dashed var(--blue-mid)}
/* A field "chip" inside a grid cell header slot */
.gc-chip{display:flex;align-items:center;gap:5px;width:100%}
.gc-chip-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.gc-chip-name{flex:1;min-width:0;font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gc-chip-del{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--red);color:white;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--t)}
.grid-cell:hover .gc-chip-del{opacity:1}
.gc-empty-hint{color:var(--g300);font-size:11px;display:flex;align-items:center;gap:4px}
/* grid add-row button */
.grid-add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;color:var(--g400);font-size:12px;font-weight:500;cursor:pointer;border-top:1px dashed var(--g200);transition:var(--t)}
.grid-add-row:hover{background:var(--g50);color:var(--blue)}
/* grid empty state */
.grid-empty{padding:32px;text-align:center;color:var(--g400);font-size:13px}
.grid-drop-zone{border:2px dashed var(--blue-mid);border-radius:var(--r);background:rgba(37,99,235,.02);min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--blue);font-size:12px;font-weight:500;transition:var(--t);margin:16px 20px;cursor:default}
.grid-drop-zone.drag-over{border-color:var(--blue);background:var(--blue-light)}

/* ─── FOOTER ZONE ──────────────────────────────────────────── */
/* Two-panel layout: left palette grid + right data grid (mirrors body) */
.ftr-layout{display:flex;align-items:stretch;min-height:160px}

/* ── Left: field-type palette — 2-column tile grid ── */
.ftr-palette{width:172px;flex-shrink:0;border-right:1px solid var(--g200);background:var(--g50);display:flex;flex-direction:column;padding:10px 10px 12px}
.ftr-palette-title{font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400);padding:0 2px 7px;border-bottom:1px solid var(--g200);margin-bottom:8px;flex-shrink:0}
.ftr-ft-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.ftr-ft{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;padding:10px 4px 8px;border:1px solid var(--g200);border-radius:var(--r);background:var(--white);cursor:grab;transition:var(--t);user-select:none}
.ftr-ft:hover{border-color:var(--purple);background:#faf5ff;box-shadow:var(--ssm)}
.ftr-ft.is-dragging{opacity:.3}
.ftr-ft-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ftr-ft-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;text-align:center;line-height:1.2}

/* ── Right: grid table (same structure as body grid) ── */
.ftr-grid-wrap{flex:1;overflow-x:auto;display:flex;flex-direction:column}
/* Column header row */
.ftr-head{display:flex;align-items:stretch;background:var(--g50);border-bottom:2px solid var(--g200)}
.ftr-rn-hd{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--g200);font-size:10px;color:var(--g400);font-weight:600;text-transform:uppercase}
.ftr-col-th{flex:1;min-width:90px;display:flex;align-items:center;gap:6px;padding:8px 10px;border-right:1px solid var(--g200);font-size:11px;font-weight:700;color:var(--g600);text-transform:uppercase;letter-spacing:.05em;cursor:pointer;transition:var(--t);position:relative;user-select:none}
.ftr-col-th:hover{background:#faf5ff;color:var(--purple)}
.ftr-col-th.sel{background:#faf5ff;color:var(--purple);border-bottom:2px solid var(--purple);margin-bottom:-2px}
.ftr-col-th.col-drag-over{border-left:3px solid var(--purple);background:#faf5ff}
.ftr-col-th .ftr-col-del{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--red);color:white;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--t)}
.ftr-col-th:hover .ftr-col-del{opacity:1}
.ftr-col-th .ftr-col-drag{color:var(--g300);font-size:10px;cursor:grab;opacity:0;margin-right:4px}
.ftr-col-th:hover .ftr-col-drag{opacity:1}
.ftr-col-th-add{padding:8px 14px;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g400);cursor:pointer;white-space:nowrap;transition:var(--t)}
.ftr-col-th-add:hover{color:var(--purple);background:#faf5ff}
/* Footer data rows */
.ftr-rows{display:flex;flex-direction:column}
.ftr-row{display:flex;align-items:stretch;border-bottom:1px solid var(--g100)}
.ftr-row:hover{background:rgba(124,58,237,.012)}
.ftr-rn{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--g100);font-size:11px;color:var(--g400);background:var(--g50)}
.ftr-cell{flex:1;min-width:90px;padding:0;border-right:1px solid var(--g100);min-height:48px;display:flex;align-items:stretch;transition:var(--t);cursor:pointer;position:relative}
.ftr-cell:last-child{border-right:none}
.ftr-cell.drop-tgt{background:#faf5ff;outline:2px dashed var(--purple);outline-offset:-2px}
.ftr-cell.sel .ftr-cell-inner{background:rgba(124,58,237,.05);outline:2px solid var(--purple);outline-offset:-2px}
/* Inner layout of a filled footer cell — label + value stacked */
.ftr-cell-inner{flex:1;padding:6px 10px;display:flex;flex-direction:column;justify-content:center;gap:1px}
.ftr-cell:hover .ftr-cell-inner{background:rgba(124,58,237,.04)}
.fc2-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--g400)}
.fc2-value{font-size:13px;font-weight:700;color:var(--g900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc2-formula{font-size:9px;font-weight:500;color:var(--purple);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fc2-del{position:absolute;top:3px;right:3px;width:14px;height:14px;border-radius:50%;background:var(--red);color:white;border:none;font-size:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:var(--t);z-index:2}
.ftr-cell:hover .fc2-del{opacity:1}
/* Empty cell drop hint */
.ftr-cell-empty{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;color:var(--g300);font-size:11px}
/* Add-row button (mirrors grid) */
.ftr-add-row{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px;color:var(--g400);font-size:12px;font-weight:500;cursor:pointer;border-top:1px dashed var(--g200);transition:var(--t)}
.ftr-add-row:hover{background:var(--g50);color:var(--purple)}
/* Empty state (no columns) */
.ftr-drop-zone{border:2px dashed var(--g200);border-radius:var(--r);background:rgba(124,58,237,.02);min-height:80px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--purple);font-size:12px;font-weight:500;transition:var(--t);margin:14px;cursor:default}
.ftr-drop-zone.drag-over{border-color:var(--purple);background:#faf5ff}
.footer-empty-state{padding:20px;text-align:center;color:var(--g400);font-size:12px}

/* ─── PROPERTIES PANEL (unchanged from original) ──────────── */
.col-props{background:var(--white);border-left:1px solid var(--g200);display:flex;flex-direction:column;overflow:hidden}
.ph{padding:15px 18px 12px;border-bottom:1px solid var(--g100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.pt{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--g400)}
.pbadge{padding:3px 8px;border-radius:4px;background:var(--blue);color:white;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.pb{padding:16px 18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px}
.pe{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--g400);padding:40px 20px;text-align:center;font-size:13px}
.pe svg{opacity:.3}
.pg{display:flex;flex-direction:column;gap:5px}
.pl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--g400)}
.pi{width:100%;padding:8px 11px;border:1px solid var(--g200);border-radius:var(--rsm);font-family:var(--f);font-size:13px;color:var(--g900);background:var(--white);outline:none;transition:var(--t)}
.pi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.pi-sel{width:100%;padding:8px 11px;border:1px solid var(--g200);border-radius:var(--rsm);font-family:var(--f);font-size:13px;color:var(--g900);background:var(--white);outline:none;cursor:pointer}
.pi-sel:focus{border-color:var(--blue)}
.ptr{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;border:1px solid var(--g200);border-radius:var(--r)}
.ptl2{font-size:13px;font-weight:600;color:var(--g800)}
.pts{font-size:11px;color:var(--g400);margin-top:1px}
.toggle{position:relative;display:inline-block;width:38px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.tslider{position:absolute;inset:0;background:var(--g300);border-radius:11px;cursor:pointer;transition:.22s}
.tslider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:white;border-radius:50%;transition:.22s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle input:checked+.tslider{background:var(--blue)}
.toggle input:checked+.tslider:before{transform:translateX(16px)}
.pdiv{display:flex;align-items:center;gap:10px;cursor:pointer;padding:2px 0}
.pdiv-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--g500);white-space:nowrap}
.pdiv-line{flex:1;height:1px;background:var(--g200)}
.pdiv svg{color:var(--g400);transition:var(--t)}
.pdiv.open svg{transform:rotate(180deg)}
.adv{display:flex;flex-direction:column;gap:12px}
.adv.hidden{display:none}
.pf{padding:13px 18px;border-top:1px solid var(--g100);display:flex;gap:10px;flex-shrink:0}
.btn-rst{flex:1;padding:9px;border:1px solid var(--g200);border-radius:var(--rsm);background:var(--white);font-family:var(--f);font-size:13px;font-weight:500;color:var(--g700);cursor:pointer;transition:var(--t)}
.btn-rst:hover{background:var(--g100)}
.btn-apl{flex:1;padding:9px;border:none;border-radius:var(--rsm);background:var(--blue);font-family:var(--f);font-size:13px;font-weight:600;color:white;cursor:pointer;transition:var(--t)}
.btn-apl:hover{background:#1d4ed8}
/* Extra props blocks */
.pp-seg{display:flex;gap:4px}
.pp-seg-btn{flex:1;padding:6px 4px;text-align:center;border:1px solid var(--g200);border-radius:4px;font-size:11px;font-weight:500;color:var(--g600);cursor:pointer;transition:var(--t)}
.pp-seg-btn:hover{border-color:var(--blue-mid);color:var(--blue);background:var(--blue-light)}
.pp-seg-btn.active{border-color:var(--blue);background:var(--blue-light);color:var(--blue);font-weight:700}
.pp-divider{height:1px;background:var(--g100);margin:4px 0}

/* ─── GHOST ────────────────────────────────────────────────── */
.ghost{position:fixed;pointer-events:none;opacity:.9;z-index:9999;padding:9px 14px;background:var(--white);border:1.5px solid var(--blue);border-radius:var(--r);box-shadow:var(--slg);font-size:13px;font-weight:600;color:var(--blue);display:none;align-items:center;gap:8px;transform:rotate(2deg)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--g900);color:white;padding:9px 18px;border-radius:var(--r);font-size:13px;font-weight:500;opacity:0;transition:.28s ease;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--g200);border-radius:99px}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════════
   COMPONENT DEFINITIONS  (identical to original + 3 extras)
═══════════════════════════════════════════════════════════════ */
const COMPS = [
  {id:'text',      name:'Text Input',   desc:'Short/Long text',    badge:'TEXT INPUT', color:'#2563eb', ph:'e.g. Acme Corp',   lbl:'Text Field',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>`,mockType:'text'},
  {id:'numeric',   name:'Numeric',      desc:'Integers, decimals', badge:'NUMERIC',    color:'#7c3aed', ph:'0.00',             lbl:'Number Field',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></svg>`,mockType:'number'},
  {id:'date',      name:'Date Picker',  desc:'Calendar select',    badge:'DATE',       color:'#059669', ph:'MM / DD / YYYY',   lbl:'Date Field',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,mockType:'text'},
  {id:'dropdown',  name:'Dropdown',     desc:'Single selection',   badge:'DROPDOWN',   color:'#d97706', ph:'Select an option…',lbl:'Dropdown Field',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>`,mockType:'text'},
  {id:'dimension', name:'Dimension',    desc:'Units & scales',     badge:'DIMENSION',  color:'#db2777', ph:'0 px',             lbl:'Dimension Field',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 3H3v18h18V3z"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>`,mockType:'text'},
  {id:'currency',  name:'Currency',     desc:'Money / amounts',    badge:'CURRENCY',   color:'#059669', ph:'0.00',             lbl:'Amount',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,mockType:'number'},
  {id:'checkbox',  name:'Checkbox',     desc:'Yes / No toggle',    badge:'CHECKBOX',   color:'#0891b2', ph:'',                 lbl:'Checkbox',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><polyline points="9 12 11 14 15 10"/></svg>`,mockType:'text'},
  {id:'formula',   name:'Formula',      desc:'Computed value',     badge:'FORMULA',    color:'#7c3aed', ph:'=SUM(…)',          lbl:'Formula',
   icon:`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 7H9l-4 5 4 5h9"/><line x1="14" y1="12" x2="20" y2="12"/></svg>`,mockType:'text'},
];

/* ═══════════════════════════════════════════════════════════════
   UTILITIES (same as original)
═══════════════════════════════════════════════════════════════ */
function uid(){ return Math.random().toString(36).slice(2,9) }
function rid(){ return 'r'+Math.random().toString(36).slice(2,8) }
function gc(id){ return COMPS.find(c=>c.id===id) }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;') }
function dots(){
  return `<svg width="13" height="13" fill="none" viewBox="0 0 24 24">
    <circle cx="9" cy="5" r="1.3" fill="#94a3b8"/><circle cx="15" cy="5" r="1.3" fill="#94a3b8"/>
    <circle cx="9" cy="12" r="1.3" fill="#94a3b8"/><circle cx="15" cy="12" r="1.3" fill="#94a3b8"/>
    <circle cx="9" cy="19" r="1.3" fill="#94a3b8"/><circle cx="15" cy="19" r="1.3" fill="#94a3b8"/>
  </svg>`
}
function mkField(compId, label, ph, req, minLen){
  return { uid:uid(), compId, label, placeholder:ph, required:req, minLength:minLen, maxLength:'' }
}

/* ═══════════════════════════════════════════════════════════════
   ── STATE ──────────────────────────────────────────────────────
   Three independent zones:
   1. hdrSections  – array of { sid, name, rows[] }
                     rows = [ { rowId, cells: [Field|null, …] } ]
   2. gridState    – { columns: [], dataRows: [] }
   3. footerState  – { rows: [ { frid, cells: [FooterCell] } ] }
═══════════════════════════════════════════════════════════════ */

/* ── Header state ─── */
let hdrSections = [
  {
    sid: uid(), name: 'Primary Information',
    rows: [
      { rowId:rid(), cells:[ mkField('text','Doc Date','29/01/2026',true,''), mkField('text','Doc No','26-27/ 4',false,'') ] },
      { rowId:rid(), cells:[ mkField('date','Bill of Laden Date','29/01/2026',false,''), mkField('date','Due Date','29/04/2026',false,'') ] },
      { rowId:rid(), cells:[ mkField('dropdown','Customer Name','Amarawathi Interio Furnishing',true,''), mkField('dropdown','Sales Account','Def Sales Accounts',true,'') ] },
      { rowId:rid(), cells:[ mkField('text','Narration','',false,''), mkField('text','Currency','Indian Rupees',false,'') ] },
    ]
  },
  {
    sid: uid(), name: 'GST',
    rows: [
      { rowId:rid(), cells:[ mkField('dropdown','CustomerGSTState','37-Andhra Pradesh',false,''), mkField('dropdown','GST SaleType','InterStateB2B',false,'') ] },
      { rowId:rid(), cells:[ mkField('dropdown','Invoice Type','',false,''), mkField('dropdown','GST Type','OE',false,'') ] },
      { rowId:rid(), cells:[ mkField('dropdown','GST URType','',false,''), mkField('dropdown','GST ExportType','',false,'') ] },
      { rowId:rid(), cells:[ mkField('dropdown','GST ReverseCharge','N',false,''), mkField('dropdown','TransactionTaxType','EXCLUSIVE',false,'') ] },
    ]
  },
  { sid: uid(), name: 'Extra Fields', rows: [] },
];
let activeSid = hdrSections[0].sid;   // which tab is visible

/* ═══════════════════════════════════════════════════════════════
   HEADER ZONE RENDER  (uses same row/cell/card system as original)
═══════════════════════════════════════════════════════════════ */
function renderHeader(){
  /* --- tabs --- */
  document.getElementById('hdrTabs').innerHTML =
    hdrSections.map(s=>`
      <div class="hz-tab ${s.sid===activeSid?'active':''}" onclick="switchHdrTab('${s.sid}')">
        ${esc(s.name)}
        <span class="tab-del" onclick="delHdrSection('${s.sid}',event)">✕</span>
      </div>`).join('') +
    `<div class="hz-tab-add" onclick="addHdrSection()" title="Add section">+</div>`;

  /* --- section contents --- */
  const sectionsEl = document.getElementById('hdrSections');
  sectionsEl.innerHTML = hdrSections.map(s=>`
    <div class="hz-sec ${s.sid===activeSid?'active':''}" id="hzsec-${s.sid}" data-sid="${s.sid}"></div>
  `).join('');

  hdrSections.forEach(sec=>{
    const cont = document.getElementById('hzsec-'+sec.sid);
    if(!cont) return;
    renderSecRows(sec, cont);
  });

  document.getElementById('hdrMeta').textContent =
    hdrSections.length + (hdrSections.length===1?' section':' sections');
}

function renderSecRows(sec, container){
  container.innerHTML = '';

  sec.rows.forEach((row, ri)=>{
    /* drop indicator before row */
    const ind = document.createElement('div');
    ind.className = 'row-drop-ind'; ind.id = 'ind-'+row.rowId;
    container.appendChild(ind);

    const rowEl = document.createElement('div');
    rowEl.className = 'form-row'; rowEl.dataset.rowId = row.rowId; rowEl.dataset.secId = sec.sid;

    /* toolbar */
    const tb = document.createElement('div'); tb.className = 'row-tb';
    tb.innerHTML = `
      <span class="rl">Row ${ri+1} · ${row.cells.length} col${row.cells.length>1?'s':''}</span>
      <span class="rsp2"></span>
      ${row.cells.length<4?`<button class="rbtn" onclick="hdrAddCol('${sec.sid}','${row.rowId}')">+ Column</button>`:''}
      <button class="rbtn danger" onclick="hdrDelRow('${sec.sid}','${row.rowId}')">✕ Row</button>`;
    rowEl.appendChild(tb);

    /* inner grid */
    const inner = document.createElement('div'); inner.className = 'row-inner';
    inner.style.gridTemplateColumns = `repeat(${row.cells.length},1fr)`;

    row.cells.forEach((cell, ci)=>{
      const cellEl = document.createElement('div');
      cellEl.className = 'field-cell' + (cell ? '' : ' is-empty');
      cellEl.dataset.rowId = row.rowId; cellEl.dataset.ci = ci; cellEl.dataset.secId = sec.sid;

      const emptyTgt = document.createElement('div');
      emptyTgt.className = 'cell-empty-tgt'; emptyTgt.textContent = 'Drop here';
      cellEl.appendChild(emptyTgt);

      if(cell){
        const comp = gc(cell.compId);
        const card = document.createElement('div');
        card.className = 'field-card' + (cell.uid===selUid&&selZone==='header' ? ' selected' : '');
        card.dataset.uid = cell.uid; card.draggable = true;
        card.innerHTML = `
          <div class="card-handle">${dots()}</div>
          <button class="fc-del" onclick="hdrDelField('${sec.sid}','${cell.uid}',event)">✕</button>
          <div class="fc-label">${esc(cell.label)}</div>
          <input class="fc-input" type="${comp.mockType}" placeholder="${esc(cell.placeholder)}" readonly tabindex="-1"/>
          <div class="fc-badge" style="color:${comp.color}">
            ${comp.icon.replace(/stroke="currentColor"/g,`stroke="${comp.color}"`)}${comp.badge}
          </div>`;
        card.addEventListener('click', e=>{ e.stopPropagation(); selHdrField(cell.uid); });
        card.addEventListener('dragstart', e=>fDragStart(e, cell.uid, sec.sid, row.rowId, ci));
        card.addEventListener('dragend', onDragEnd);
        cellEl.appendChild(card);
      }

      cellEl.addEventListener('dragover',  e=>hdrCellOver(e, row.rowId, ci));
      cellEl.addEventListener('dragleave', e=>hdrCellLeave(e, cellEl));
      cellEl.addEventListener('drop',      e=>hdrCellDrop(e, sec.sid, row.rowId, ci));
      inner.appendChild(cellEl);
    });

    rowEl.appendChild(inner);
    container.appendChild(rowEl);
  });

  /* trailing drop indicator */
  const trail = document.createElement('div');
  trail.className = 'row-drop-ind'; trail.id = 'ind-trail-'+sec.sid;
  container.appendChild(trail);

  /* add-row drop zone */
  const zone = document.createElement('div');
  zone.className = 'sec-drop-zone'; zone.dataset.secId = sec.sid;
  zone.innerHTML = `<div class="drop-plus">+</div><span>Drop field here to add row</span>`;
  zone.addEventListener('dragover',  e=>{ e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', ()=> zone.classList.remove('drag-over'));
  zone.addEventListener('drop',      e=> hdrZoneDrop(e, sec.sid));
  container.appendChild(zone);
}

/* ── Header mutations ─────────────────────────────────────── */
function switchHdrTab(sid){ activeSid=sid; renderHeader(); renderStrTree(); }

function addHdrSection(){
  const name = prompt('Section name:', 'New Section');
  if(!name) return;
  const s = { sid:uid(), name:name.trim(), rows:[] };
  hdrSections.push(s); activeSid = s.sid;
  renderHeader(); renderStrTree();
  showToast(`Section "${name}" added`);
}

function delHdrSection(sid, e){
  e && e.stopPropagation();
  if(hdrSections.length <= 1){ showToast('At least one section required'); return; }
  hdrSections = hdrSections.filter(s=>s.sid!==sid);
  if(activeSid===sid) activeSid = hdrSections[0].sid;
  renderHeader(); renderStrTree();
  showToast('Section removed');
}

function hdrAddCol(secId, rowId){
  const sec = hdrSections.find(s=>s.sid===secId); if(!sec) return;
  const row = sec.rows.find(r=>r.rowId===rowId); if(!row || row.cells.length>=4) return;
  row.cells.push(null);
  renderHeader();
  showToast('Column added – drop a field into it');
}

function hdrDelRow(secId, rowId){
  const sec = hdrSections.find(s=>s.sid===secId); if(!sec) return;
  sec.rows = sec.rows.filter(r=>r.rowId!==rowId);
  renderHeader(); renderStrTree();
  showToast('Row removed');
}

function hdrDelField(secId, fuid, e){
  e && e.stopPropagation();
  const sec = hdrSections.find(s=>s.sid===secId); if(!sec) return;
  for(const row of sec.rows){
    const ci = row.cells.findIndex(c=>c&&c.uid===fuid);
    if(ci !== -1){
      if(row.cells.length===1) sec.rows = sec.rows.filter(r=>r.rowId!==row.rowId);
      else row.cells.splice(ci,1);
      break;
    }
  }
  if(selUid===fuid){ selUid=null; }
  renderHeader(); renderStrTree(); renderProps();
  showToast('Field removed');
}

function selHdrField(u){ selUid=u; selZone='header'; selColCid=null; selFcid=null; renderHeader(); renderProps(); }

function hdrFindField(u){
  for(const s of hdrSections)
    for(const r of s.rows)
      for(const c of r.cells)
        if(c&&c.uid===u) return c;
  return null;
}
function hdrFindLoc(u){
  for(const s of hdrSections)
    for(const r of s.rows)
      for(let ci=0;ci<r.cells.length;ci++)
        if(r.cells[ci]&&r.cells[ci].uid===u) return{sec:s,row:r,ci};
  return null;
}

/* ── Header drag/drop ─────────────────────────────────────── */
function hdrCellOver(e, rowId, ci){
  e.preventDefault(); e.stopPropagation();
  document.querySelector(`.field-cell[data-row-id="${rowId}"][data-ci="${ci}"]`)?.classList.add('drag-over');
}
function hdrCellLeave(e, cellEl){
  if(!cellEl.contains(e.relatedTarget)) cellEl.classList.remove('drag-over');
}
function hdrCellDrop(e, secId, rowId, colIdx){
  e.preventDefault(); e.stopPropagation();
  document.querySelector(`.field-cell[data-row-id="${rowId}"][data-ci="${colIdx}"]`)?.classList.remove('drag-over');
  if(!dragSrc) return;

  const sec = hdrSections.find(s=>s.sid===secId); if(!sec) return;
  const row = sec.rows.find(r=>r.rowId===rowId);   if(!row) return;

  if(dragSrc.type==='comp'){
    const comp = gc(dragSrc.compId);
    const nf = mkField(comp.id, comp.lbl, comp.ph, false, '');
    if(row.cells[colIdx]===null)          row.cells[colIdx] = nf;
    else if(row.cells.length<4)           row.cells.splice(colIdx,0,nf);
    else {
      const ri = sec.rows.findIndex(r=>r.rowId===rowId);
      sec.rows.splice(ri+1,0,{rowId:rid(),cells:[nf]});
    }
    selUid=nf.uid; selZone='header'; selColCid=null; selFcid=null;
    showToast(`"${comp.name}" added`);
  } else if(dragSrc.type==='field'){
    const {uid:su, fromSecId, fromRow, fromCol} = dragSrc;
    if(fromSecId===secId && fromRow===rowId && fromCol===colIdx) return;
    const fromSec = hdrSections.find(s=>s.sid===fromSecId);
    const srcRow  = fromSec?.rows.find(r=>r.rowId===fromRow);
    if(!srcRow) return;
    const moving = srcRow.cells[fromCol];
    const dest   = row.cells[colIdx];
    if(fromSecId===secId && fromRow===rowId){
      row.cells[fromCol]=dest; row.cells[colIdx]=moving;
    } else {
      if(dest===null){ row.cells[colIdx]=moving; srcRow.cells[fromCol]=null; hdrCleanRow(fromSec,srcRow); }
      else           { srcRow.cells[fromCol]=dest; row.cells[colIdx]=moving; }
    }
    selUid=su; selZone='header';
    showToast('Field moved');
  }
  renderHeader(); renderStrTree(); renderProps();
}

function hdrZoneDrop(e, secId){
  e.preventDefault(); e.target.closest('.sec-drop-zone')?.classList.remove('drag-over');
  if(!dragSrc) return;
  const sec = hdrSections.find(s=>s.sid===secId); if(!sec) return;
  if(dragSrc.type==='comp'){
    const comp=gc(dragSrc.compId);
    const nf=mkField(comp.id,comp.lbl,comp.ph,false,'');
    sec.rows.push({rowId:rid(),cells:[nf]});
    selUid=nf.uid; selZone='header'; selColCid=null; selFcid=null;
    showToast(`New row with "${comp.name}"`);
  } else if(dragSrc.type==='field'){
    const {uid:su,fromSecId,fromRow,fromCol}=dragSrc;
    const fromSec=hdrSections.find(s=>s.sid===fromSecId);
    const srcRow=fromSec?.rows.find(r=>r.rowId===fromRow);
    if(!srcRow) return;
    const moving=srcRow.cells[fromCol];
    srcRow.cells[fromCol]=null; hdrCleanRow(fromSec,srcRow);
    sec.rows.push({rowId:rid(),cells:[moving]});
    selUid=su; selZone='header';
    showToast('Moved to new row');
  }
  renderHeader(); renderStrTree(); renderProps();
}

function hdrCleanRow(sec, row){
  while(row.cells.length>1 && row.cells[row.cells.length-1]===null) row.cells.pop();
  if(row.cells.every(c=>c===null)) sec.rows=sec.rows.filter(r=>r.rowId!==row.rowId);
}

    cont.innerHTML = `
      <div class="grid-drop-zone" id="gridMainDrop">
        <div class="drop-plus">+</div>

      </div>`;
    wireGridMainDrop();
    return;
  }

  /* build table */
  let html = `<div class="grid-wrap"><div class="grid-outer">`;

  /* --- column header row --- */
  html += `<div class="grid-head"><div class="grid-rn-hd">#</div>`;
  gridCols.forEach(col=>{
    const isSel = selColCid===col.cid;
    html += `
      <div class="grid-col-th ${isSel?'sel':''}" data-cid="${col.cid}"
           draggable="true"
           ondragstart="gridColDragStart(event,'${col.cid}')"
           ondragover="gridColDragOver(event,'${col.cid}',event)"
           ondragleave="gridColDragLeave(event,'${col.cid}')"
           ondrop="gridColDrop(event,'${col.cid}')"
           ondragend="gridColDragEnd(event)"
           onclick="selectCol('${col.cid}')">
        <span class="col-th-drag" title="Drag to reorder">${dots()}</span>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(col.label)}</span>
        ${col.field?`<span style="width:8px;height:8px;border-radius:50%;background:${gc(col.field.compId)?.color||'#ccc'};flex-shrink:0;display:inline-block"></span>`:''}
        <button class="col-th-del" onclick="delGridColByCid('${col.cid}',event)">✕</button>
      </div>`;
  });
  html += `<div class="grid-col-th-add" onclick="addGridCol()">+ Col</div></div>`;

  /* --- data rows --- */
  html += `<div class="grid-rows">`;
  gridDataRows.forEach((row,ri)=>{
    html += `<div class="grid-row"><div class="grid-rn">${ri+1}</div>`;
    gridCols.forEach(col=>{
      const val = row.values[col.cid]||'';
      const isSel = selColCid===col.cid;
      html += `
        <div class="grid-cell${isSel?' sel':''}"
             onclick="selectCol('${col.cid}')"
             ondragover="gridCellOver(event,this)"
             ondragleave="gridCellLeave(event,this)"
             ondrop="gridCellDrop(event,'${col.cid}','${row.rid}')">
          ${val ? esc(val) : `<span class="gc-empty-hint">
            <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            —
          </span>`}
        </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;

  /* add-row button */
  html += `<div class="grid-add-row" onclick="addGridDataRow()">
    <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Add Row
  </div>`;

  html += `</div></div>`;
  cont.innerHTML = html;
}

function wireGridMainDrop(){
  const z = document.getElementById('gridMainDrop');
  if(!z) return;
  z.addEventListener('dragover',  e=>{ e.preventDefault(); z.classList.add('drag-over'); });
  z.addEventListener('dragleave', ()=> z.classList.remove('drag-over'));
  z.addEventListener('drop',      e=>{ e.preventDefault(); z.classList.remove('drag-over');
    if(!dragSrc || dragSrc.type!=='comp') return;
    const comp = gc(dragSrc.compId);
    const newCol = { cid:uid(), label:comp.lbl, width:120, align:'left', format:'text', field:mkField(comp.id,comp.lbl,comp.ph,false,'') };
    gridCols.push(newCol);
    gridDataRows.forEach(r=>r.values[newCol.cid]='');
    selColCid=newCol.cid; selZone='grid';
    renderBody(); renderStrTree(); renderProps();
    showToast(`Column "${comp.lbl}" created`);
  });
}

/* ── Grid column actions ──────────────────────────────────── */
function addGridCol(){
  const label = prompt('Column label:', 'New Column');
  if(!label) return;
  const newCol = { cid:uid(), label:label.trim(), width:120, align:'left', format:'text', field:null };
  gridCols.push(newCol);
  gridDataRows.forEach(r=>r.values[newCol.cid]='');
  selColCid=newCol.cid; selZone='grid'; selUid=null; selFcid=null;
  renderBody(); renderStrTree(); renderProps();
  showToast(`Column "${label}" added`);
}

function addGridDataRow(){
  const row = { rid:rid(), values:{} };
  gridCols.forEach(c=>row.values[c.cid]='');
  gridDataRows.push(row);
  renderBody();
  showToast('Row added');
}

function delGridColByCid(cid, e){
  e && e.stopPropagation();
  gridCols = gridCols.filter(c=>c.cid!==cid);
  gridDataRows.forEach(r=>delete r.values[cid]);
  if(selColCid===cid){ selColCid=null; }
  renderBody(); renderStrTree(); renderProps();
  showToast('Column removed');
}

function selectCol(cid){
  selColCid=cid; selZone='grid'; selUid=null; selFcid=null;
  renderBody(); renderStrTree(); renderProps();
}

/* ── Grid column drag-reorder ─────────────────────────────── */
function gridColDragStart(e, cid){
  dragColCid = cid;
  e.dataTransfer.effectAllowed = 'move';
  setBlankDragImage(e);
}
function gridColDragOver(e, cid){
  if(!dragColCid || dragColCid===cid) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.grid-col-th').forEach(el=>el.classList.toggle('col-drag-over', el.dataset.cid===cid));
}
function gridColDragLeave(e, cid){
  document.querySelector(`.grid-col-th[data-cid="${cid}"]`)?.classList.remove('col-drag-over');
}
function gridColDrop(e, toCid){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.col-drag-over').forEach(el=>el.classList.remove('col-drag-over'));
  if(!dragColCid || dragColCid===toCid){ dragColCid=null; return; }
  const fi=gridCols.findIndex(c=>c.cid===dragColCid);
  const ti=gridCols.findIndex(c=>c.cid===toCid);
  const [col]=gridCols.splice(fi,1);
  gridCols.splice(ti,0,col);
  dragColCid=null;
  renderBody();
  showToast('Column reordered');
}
function gridColDragEnd(){ dragColCid=null; document.querySelectorAll('.col-drag-over').forEach(el=>el.classList.remove('col-drag-over')); }

/* ── Grid cell drag-drop (assign field to column) ─────────── */
function gridCellOver(e, el){ e.preventDefault(); el.classList.add('drop-tgt'); }
function gridCellLeave(e, el){ el.classList.remove('drop-tgt'); }
function gridCellDrop(e, colCid, rowRid){
  e.preventDefault(); e.target.closest('.grid-cell')?.classList.remove('drop-tgt');
  if(!dragSrc || dragSrc.type!=='comp') return;
  const comp = gc(dragSrc.compId);
  const col = gridCols.find(c=>c.cid===colCid); if(!col) return;
  /* Assign the component as this column's field type (if not already set) */
  if(!col.field) col.field = mkField(comp.id, comp.lbl, comp.ph, false, '');
  /* Also set the cell value to a sample */
  const row = gridDataRows.find(r=>r.rid===rowRid);
  if(row) row.values[colCid] = comp.ph||comp.lbl;
  selColCid=colCid; selZone='grid'; selUid=null; selFcid=null;
  renderBody(); renderProps();
  showToast(`"${comp.name}" assigned to column`);
}

/* ═══════════════════════════════════════════════════════════════
   FOOTER ZONE
═══════════════════════════════════════════════════════════════ */
const AGG_FNS = ['SUM','AVG','COUNT','MIN','MAX','CUSTOM'];

/* ── renderFooter ─────────────────────────────────────────────
   Two-panel layout:
     LEFT  – draggable field-type palette (TEXT, NUMERIC, …)
     RIGHT – grid table mirroring the body/grid structure
──────────────────────────────────────────────────────────────── */
function renderFooter(){
  const cont = document.getElementById('footerContent');

  /* meta counts: count ftrCols for column count, ftrDataRows for rows */
  const colCount = ftrCols.length;
  const rowCount = ftrDataRows.length;
  document.getElementById('ftrMeta').textContent =
    colCount + (colCount===1?' column':' columns') + ' · ' + rowCount + ' rows';

  /* ── LEFT: palette ── */
  const paletteHtml = `
    <div class="ftr-palette">
      <div class="ftr-palette-title">Field Types</div>
      <div class="ftr-ft-grid">
        ${FOOTER_FIELD_TYPES.map(ft=>`
          <div class="ftr-ft" draggable="true" data-ftid="${ft.ftid}"
               ondragstart="ftrFtDragStart(event,'${ft.ftid}')"
               ondragend="onDragEnd()">
            <div class="ftr-ft-icon" style="background:${ft.color}20;color:${ft.color}">${ft.icon}</div>
            <div class="ftr-ft-label" style="color:${ft.color}">${ft.label}</div>
          </div>`).join('')}
      </div>
    </div>`;

  /* ── RIGHT: grid table ── */
  let gridHtml = `<div class="ftr-grid-wrap">`;

  if(ftrCols.length === 0){
    gridHtml += `
      <div class="ftr-drop-zone" id="ftrMainDrop">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Drag a field type from the left panel, or click <strong>+ Column</strong> to start</span>
      </div>`;
  } else {
    /* column header row */
    gridHtml += `<div class="ftr-head"><div class="ftr-rn-hd">#</div>`;
    ftrCols.forEach(col=>{
      const ft   = gft(col.fieldType);
      const isSel = selFtrColCid === col.fcc;
      gridHtml += `
        <div class="ftr-col-th${isSel?' sel':''}" data-fcc="${col.fcc}"
             draggable="true"
             ondragstart="ftrColDragStart(event,'${col.fcc}')"
             ondragover="ftrColDragOver(event,'${col.fcc}')"
             ondragleave="ftrColDragLeave(event,'${col.fcc}')"
             ondrop="ftrColDrop(event,'${col.fcc}')"
             ondragend="ftrColDragEnd()"
             onclick="selectFtrCol('${col.fcc}')">
          <span class="ftr-col-drag">${dots()}</span>
          ${ft ? `<span style="width:7px;height:7px;border-radius:50%;background:${ft.color};flex-shrink:0;display:inline-block"></span>` : ''}
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(col.label)}</span>
          <button class="ftr-col-del" onclick="delFtrCol('${col.fcc}',event)">✕</button>
        </div>`;
    });
    gridHtml += `<div class="ftr-col-th-add" onclick="addFtrCol()">+ Col</div></div>`;

    /* data rows */
    gridHtml += `<div class="ftr-rows">`;
    ftrDataRows.forEach((row, ri)=>{
      gridHtml += `<div class="ftr-row"><div class="ftr-rn">${ri+1}</div>`;
      ftrCols.forEach(col=>{
        const val   = row.values[col.fcc]||'';
        const ft    = gft(col.fieldType);
        const isSel = selFtrColCid===col.fcc;
        gridHtml += `
          <div class="ftr-cell${isSel?' sel':''}"
               onclick="selectFtrCol('${col.fcc}')"
               ondragover="ftrCellOver(event,this)"
               ondragleave="ftrCellLeave(event,this)"
               ondrop="ftrCellDrop(event,'${col.fcc}','${row.frr}')">
            ${val
              ? `<button class="fc2-del" onclick="clearFtrCell('${col.fcc}','${row.frr}',event)">✕</button>
                 <div class="ftr-cell-inner">
                   <div class="fc2-label">${esc(col.label)}</div>
                   <div class="fc2-value">${esc(val)}</div>
                   ${ft?`<div class="fc2-formula">${ft.label}</div>`:''}
                 </div>`
              : `<div class="ftr-cell-inner">
                   <div class="ftr-cell-empty">
                     <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                     —
                   </div>
                 </div>`}
          </div>`;
      });
      gridHtml += `</div>`;
    });
    gridHtml += `</div>`;

    /* add-row bar */
    gridHtml += `
      <div class="ftr-add-row" onclick="addFtrDataRow()">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Row
      </div>`;
  }

  gridHtml += `</div>`; /* /ftr-grid-wrap */

  cont.innerHTML = `<div class="ftr-layout">${paletteHtml}${gridHtml}</div>`;

  /* wire the empty-state drop zone after innerHTML is set */
  const mdz = document.getElementById('ftrMainDrop');
  if(mdz){
    mdz.addEventListener('dragover',  e=>{ e.preventDefault(); mdz.classList.add('drag-over'); });
    mdz.addEventListener('dragleave', ()=> mdz.classList.remove('drag-over'));
    mdz.addEventListener('drop',      e=>{ e.preventDefault(); mdz.classList.remove('drag-over'); ftrDropNewCol(e); });
  }
}

/* ── Footer field-type palette drag start ─────────────────── */
function ftrFtDragStart(e, ftid){
  dragSrc = { type:'ftr-ft', ftid };
  e.dataTransfer.effectAllowed = 'copy';
  setBlankDragImage(e);
  const ft = gft(ftid);
  showGhost(ft.label, ft.icon);
  document.querySelector(`.ftr-ft[data-ftid="${ftid}"]`)?.classList.add('is-dragging');
}

/* ── Drop new column (empty-state zone) ───────────────────── */
function ftrDropNewCol(e){
  if(!dragSrc) return;
  let label = 'New Column', fieldType = null;
  if(dragSrc.type==='ftr-ft'){
    const ft = gft(dragSrc.ftid);
    label = ft.label; fieldType = dragSrc.ftid;
  } else if(dragSrc.type==='comp'){
    label = gc(dragSrc.compId)?.lbl || 'Column';
  }
  const newCol = { fcc:uid(), label, width:120, align:'left', fieldType };
  ftrCols.push(newCol);
  ftrDataRows.forEach(r=>r.values[newCol.fcc]='');
  selFtrColCid=newCol.fcc; selZone='footer'; selUid=null; selColCid=null; selFcid=null;
  renderFooter(); renderStrTree(); renderProps();
  showToast(`Footer column "${label}" created`);
}

/* ── Footer column CRUD ───────────────────────────────────── */
function addFtrCol(){
  const label = prompt('Footer column label:', 'New Column');
  if(!label) return;
  const newCol = { fcc:uid(), label:label.trim(), width:120, align:'left', fieldType:null };
  ftrCols.push(newCol);
  ftrDataRows.forEach(r=>r.values[newCol.fcc]='');
  selFtrColCid=newCol.fcc; selZone='footer'; selUid=null; selColCid=null; selFcid=null;
  renderFooter(); renderStrTree(); renderProps();
  showToast(`Footer column "${label}" added`);
}

function addFtrDataRow(){
  const row = { frr:uid(), values:{} };
  ftrCols.forEach(c=>row.values[c.fcc]='');
  ftrDataRows.push(row);
  renderFooter();
  showToast('Footer row added');
}

function delFtrCol(fcc, e){
  e && e.stopPropagation();
  ftrCols = ftrCols.filter(c=>c.fcc!==fcc);
  ftrDataRows.forEach(r=>delete r.values[fcc]);
  if(selFtrColCid===fcc){ selFtrColCid=null; }
  renderFooter(); renderStrTree(); renderProps();
  showToast('Footer column removed');
}

function selectFtrCol(fcc){
  selFtrColCid=fcc; selZone='footer-col'; selUid=null; selColCid=null; selFcid=null;
  renderFooter(); renderProps();
}

function clearFtrCell(fcc, frr, e){
  e && e.stopPropagation();
  const row = ftrDataRows.find(r=>r.frr===frr); if(!row) return;
  row.values[fcc]='';
  renderFooter();
}

/* ── Footer column drag-reorder ───────────────────────────── */
function ftrColDragStart(e, fcc){
  dragFtrColCid = fcc;
  e.dataTransfer.effectAllowed = 'move';
  setBlankDragImage(e);
}
function ftrColDragOver(e, fcc){
  if(dragSrc?.type==='ftr-ft'){ e.preventDefault(); return; } /* also allow palette drops onto th */
  if(!dragFtrColCid || dragFtrColCid===fcc) return;
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.ftr-col-th').forEach(el=>el.classList.toggle('col-drag-over', el.dataset.fcc===fcc));
}
function ftrColDragLeave(e, fcc){
  document.querySelector(`.ftr-col-th[data-fcc="${fcc}"]`)?.classList.remove('col-drag-over');
}
function ftrColDrop(e, toFcc){
  e.preventDefault(); e.stopPropagation();
  document.querySelectorAll('.ftr-col-th').forEach(el=>el.classList.remove('col-drag-over'));
  /* palette ft dropped onto an existing column → assign field type */
  if(dragSrc?.type==='ftr-ft'){
    const col = ftrCols.find(c=>c.fcc===toFcc); if(!col) return;
    const ft  = gft(dragSrc.ftid);
    col.fieldType = dragSrc.ftid;
    col.label     = col.label===col.fieldType||col.label==='New Column' ? ft.label : col.label;
    dragFtrColCid=null; renderFooter(); renderProps();
    showToast(`Field type set to ${ft.label}`);
    return;
  }
  /* reorder */
  if(!dragFtrColCid || dragFtrColCid===toFcc){ dragFtrColCid=null; return; }
  const fi = ftrCols.findIndex(c=>c.fcc===dragFtrColCid);
  const ti = ftrCols.findIndex(c=>c.fcc===toFcc);
  const [col] = ftrCols.splice(fi,1);
  ftrCols.splice(ti,0,col);
  dragFtrColCid=null;
  renderFooter();
  showToast('Footer column reordered');
}
function ftrColDragEnd(){
  dragFtrColCid=null;
  document.querySelectorAll('.ftr-col-th').forEach(el=>el.classList.remove('col-drag-over'));
}

/* ── Footer cell drag-drop ────────────────────────────────── */
function ftrCellOver(e, el){ e.preventDefault(); el.classList.add('drop-tgt'); }
function ftrCellLeave(e, el){ el.classList.remove('drop-tgt'); }
function ftrCellDrop(e, fcc, frr){
  e.preventDefault(); e.target.closest('.ftr-cell')?.classList.remove('drop-tgt');
  if(!dragSrc) return;
  const col = ftrCols.find(c=>c.fcc===fcc); if(!col) return;
  const row = ftrDataRows.find(r=>r.frr===frr); if(!row) return;

  if(dragSrc.type==='ftr-ft'){
    /* assign field type to column + place sample value */
    const ft = gft(dragSrc.ftid);
    col.fieldType = dragSrc.ftid;
    const samples = {ftext:'Sample text',fnumeric:'0.00',fdimension:'100 px',fdate:'DD/MM/YYYY',fdatetime:'DD/MM/YYYY HH:MM',fcombo:'Option A',fimage:'image.png'};
    row.values[fcc] = samples[dragSrc.ftid]||ft.label;
    selFtrColCid=fcc; selZone='footer-col'; selUid=null; selColCid=null; selFcid=null;
    renderFooter(); renderProps();
    showToast(`"${ft.label}" placed in footer`);
  } else if(dragSrc.type==='comp'){
    /* body component dropped into footer cell */
    const comp = gc(dragSrc.compId);
    row.values[fcc] = comp.ph||comp.lbl;
    selFtrColCid=fcc; selZone='footer-col'; selUid=null; selColCid=null; selFcid=null;
    renderFooter(); renderProps();
    showToast(`"${comp.name}" placed in footer`);
  }
}

/* ── Legacy footer row/cell actions (kept intact for state compat) ── */
function addFooterRow(){
  /* "add row" button in zone bar – creates a new ftrDataRow */
  if(ftrCols.length===0){
    showToast('Add at least one footer column first'); return;
  }
  addFtrDataRow();
}

function selectFtrCell(fcid){
  selFcid=fcid; selZone='footer'; selUid=null; selColCid=null;
  renderFooter(); renderProps();
}

function delFtrCell(frid, fcid, e){
  e && e.stopPropagation();
  const row = footerRows.find(r=>r.frid===frid); if(!row) return;
  row.cells = row.cells.filter(c=>c.fcid!==fcid);
  if(!row.cells.length) footerRows = footerRows.filter(r=>r.frid!==frid);
  if(selFcid===fcid){ selFcid=null; }
  renderFooter(); renderStrTree(); renderProps();
  showToast('Summary field removed');
}

function ftrDropOver(e, el){ e.preventDefault(); el.classList.add('drag-over'); }
function ftrDropLeave(e, el){ el.classList.remove('drag-over'); }
function ftrDropCell(e, frid){
  e.preventDefault(); e.target.closest('.footer-drop-slot')?.classList.remove('drag-over');
  if(!dragSrc || dragSrc.type!=='comp') return;
  const comp = gc(dragSrc.compId);
  const row  = footerRows.find(r=>r.frid===frid); if(!row) return;
  const matchCol = gridCols.find(c=>c.field?.compId===comp.id);
  const defaultAgg = ['numeric','currency','formula'].includes(comp.id) ? 'SUM' : 'COUNT';
  const newCell = {
    fcid:uid(), label:comp.lbl, aggFn:defaultAgg,
    refColCid: matchCol ? matchCol.cid : (gridCols[0]?.cid||null),
    value:'—'
  };
  row.cells.push(newCell);
  selFcid=newCell.fcid; selZone='footer'; selUid=null; selColCid=null;
  renderFooter(); renderProps();
  showToast(`Summary field "${comp.lbl}" added`);
}

/* ═══════════════════════════════════════════════════════════════
   PROPERTIES PANEL

    ftr.style.display='flex'; cont.innerHTML=html;

      <div class="pg"><div class="pl">Width (px)</div>
        <input class="pi" type="number" value="${col.width}" oninput="updColProp('width',+this.value)"/></div>
      <div class="pg"><div class="pl">Alignment</div>
        <div class="pp-seg">
          ${['left','center','right'].map(a=>`
            <div class="pp-seg-btn ${col.align===a?'active':''}" onclick="updColProp('align','${a}')">${a.charAt(0).toUpperCase()+a.slice(1)}</div>`).join('')}
        </div></div>
      <div class="pg"><div class="pl">Format</div>
        <select class="pi-sel" onchange="updColProp('format',this.value)">
          ${['text','number','currency','date','percent','boolean'].map(f=>`
            <option value="${f}" ${col.format===f?'selected':''}>${f.charAt(0).toUpperCase()+f.slice(1)}</option>`).join('')}
        </select></div>
      <div class="pp-divider"></div>
      ${col.field ? `
        <div class="pg"><div class="pl" style="color:#059669">Assigned Field</div>
          <div style="display:flex;align-items:center;gap:6px;padding:8px 10px;border:1px solid var(--g200);border-radius:var(--rsm);background:var(--g50)">
            <span style="width:8px;height:8px;border-radius:50%;background:${gc(col.field.compId)?.color||'#ccc'};flex-shrink:0"></span>
            <span style="font-size:13px;font-weight:600">${esc(col.field.label)}</span>
            <span style="font-size:10px;color:var(--g400);flex:1">${gc(col.field.compId)?.badge||''}</span>
          </div></div>
        <div class="pg"><div class="pl">Field Label</div>
          <input class="pi" value="${esc(col.field.label)}" oninput="updColFieldProp('label',this.value)"/></div>
        <div class="pg"><div class="pl">Placeholder</div>
          <input class="pi" value="${esc(col.field.placeholder)}" oninput="updColFieldProp('placeholder',this.value)"/></div>
        <div class="ptr">
          <div><div class="ptl2">Required</div><div class="pts">Validation on submit</div></div>
          <label class="toggle"><input type="checkbox" ${col.field.required?'checked':''} onchange="updColFieldProp('required',this.checked)"/>
          <span class="tslider"></span></label>
        </div>` :
        `<div style="text-align:center;padding:12px;color:var(--g400);font-size:12px;border:1px dashed var(--g200);border-radius:var(--r)">
          Drag a component onto any cell in this column to assign a field type
        </div>`}
    `);
    return;
  }

  /* ── Footer column selected ── */
  if(selZone==='footer-col' && selFtrColCid){
    const col = ftrCols.find(c=>c.fcc===selFtrColCid);
    if(!col){ hideProps(); return; }
    const ft = gft(col.fieldType);
    showProps('FTR COL','#7c3aed',`
      <div class="pg"><div class="pl">Column Label</div>
        <input class="pi" value="${esc(col.label)}" oninput="updFtrColProp('label',this.value)"/></div>
      <div class="pg"><div class="pl">Field Type</div>
        <div style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--g200);border-radius:var(--rsm);background:var(--g50)">
          ${ft
            ? `<span style="width:8px;height:8px;border-radius:50%;background:${ft.color};flex-shrink:0"></span>
               <span style="font-size:13px;font-weight:600;flex:1">${ft.label}</span>`
            : `<span style="font-size:12px;color:var(--g400);flex:1">None assigned</span>`}
        </div>
        <select class="pi-sel" style="margin-top:4px" onchange="updFtrColProp('fieldType',this.value)">
          <option value="">— none —</option>
          ${FOOTER_FIELD_TYPES.map(f=>`<option value="${f.ftid}" ${col.fieldType===f.ftid?'selected':''}>${f.label}</option>`).join('')}
        </select></div>
      <div class="pg"><div class="pl">Width (px)</div>
        <input class="pi" type="number" value="${col.width}" oninput="updFtrColProp('width',+this.value)"/></div>
      <div class="pg"><div class="pl">Alignment</div>
        <div class="pp-seg">
          ${['left','center','right'].map(a=>`
            <div class="pp-seg-btn ${col.align===a?'active':''}" onclick="updFtrColProp('align','${a}')">${a[0].toUpperCase()+a.slice(1)}</div>`).join('')}
        </div></div>
    `);
    return;
  }

  /* ── Footer cell selected (legacy) ── */
  if(selZone==='footer' && selFcid){
    let cell = null;
    for(const row of footerRows) cell = cell || row.cells.find(c=>c.fcid===selFcid);
    if(!cell){ hideProps(); return; }
    const refCol = gridCols.find(c=>c.cid===cell.refColCid);
    showProps('SUMMARY','#7c3aed',`
      <div class="pg"><div class="pl">Label</div>
        <input class="pi" value="${esc(cell.label)}" oninput="updFtrProp('label',this.value)"/></div>
      <div class="pg"><div class="pl">Aggregation Function</div>
        <select class="pi-sel" onchange="updFtrProp('aggFn',this.value)">
          ${AGG_FNS.map(fn=>`<option value="${fn}" ${cell.aggFn===fn?'selected':''}>${fn}</option>`).join('')}
        </select></div>
      <div class="pg"><div class="pl">Reference Column</div>
        <select class="pi-sel" onchange="updFtrProp('refColCid',this.value)">
          <option value="">— none —</option>
          ${gridCols.map(c=>`<option value="${c.cid}" ${cell.refColCid===c.cid?'selected':''}>${esc(c.label)}</option>`).join('')}
        </select></div>
      <div class="pg"><div class="pl">Display Value</div>
        <input class="pi" value="${esc(cell.value)}" oninput="updFtrProp('value',this.value)"/></div>
      ${refCol?`<div style="padding:8px 10px;background:var(--g50);border-radius:var(--rsm);font-size:12px;color:var(--g500)">
        <strong>${cell.aggFn}</strong> of <strong>${esc(refCol.label)}</strong>
      </div>`:''}
    `);
    return;
  }

  /* ── Header field selected (original behaviour) ── */
  const f = hdrFindField(selUid);
  if(!f){ hideProps(); return; }
  const comp = gc(f.compId);
  showProps(comp.id.toUpperCase(), comp.color, `
    <div class="pg"><div class="pl">Field Label</div>
      <input class="pi" value="${esc(f.label)}" oninput="liveUpdHdr('label',this.value)"/></div>
    <div class="pg"><div class="pl">Placeholder</div>
      <input class="pi" value="${esc(f.placeholder)}" oninput="liveUpdHdr('placeholder',this.value)"/></div>
    <div class="ptr">
      <div><div class="ptl2">Required Field</div><div class="pts">Validation will trigger</div></div>
      <label class="toggle"><input type="checkbox" ${f.required?'checked':''} onchange="liveUpdHdr('required',this.checked)"/>
      <span class="tslider"></span></label>
    </div>
    <div class="pdiv ${advOpen?'open':''}" onclick="togAdv()" id="advDiv">
      <span class="pdiv-label">Advanced Settings</span>
      <div class="pdiv-line"></div>
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="adv ${advOpen?'':'hidden'}" id="advSet">
      <div class="pg"><div class="pl">Minimum Length</div>
        <input class="pi" type="number" value="${f.minLength}" placeholder="—" oninput="liveUpdHdr('minLength',this.value)"/></div>
      <div class="pg"><div class="pl">Maximum Length</div>
        <input class="pi" type="number" value="${f.maxLength||''}" placeholder="—" oninput="liveUpdHdr('maxLength',this.value)"/></div>
    </div>
  `);
}

/* ── Prop update helpers ──────────────────────────────────── */
function liveUpdHdr(k,v){ const f=hdrFindField(selUid); if(!f)return; f[k]=v; renderHeader(); }
function updColProp(k,v){
  const col=gridCols.find(c=>c.cid===selColCid); if(!col)return; col[k]=v; renderBody(); renderProps();
}
function updColFieldProp(k,v){
  const col=gridCols.find(c=>c.cid===selColCid); if(!col||!col.field)return; col.field[k]=v; renderBody();
}
function updFtrProp(k,v){
  for(const row of footerRows){ const c=row.cells.find(c=>c.fcid===selFcid); if(c){ c[k]=v; renderFooter(); renderProps(); return; } }
}
function updFtrColProp(k,v){
  const col=ftrCols.find(c=>c.fcc===selFtrColCid); if(!col)return; col[k]=v; renderFooter(); renderProps();
}
function togAdv(){
  advOpen=!advOpen;
  document.getElementById('advDiv')?.classList.toggle('open',advOpen);
  document.getElementById('advSet')?.classList.toggle('hidden',!advOpen);
}

/* ═══════════════════════════════════════════════════════════════
   DRAG SOURCES
═══════════════════════════════════════════════════════════════ */
function cDragStart(e, compId){
  dragSrc = { type:'comp', compId };
  e.dataTransfer.effectAllowed = 'copy';
  setBlankDragImage(e);
  const comp = gc(compId);
  showGhost(comp.name, comp.icon);
  document.querySelector(`[data-cid="${compId}"]`)?.classList.add('is-dragging');
}

function fDragStart(e, u, fromSecId, fromRow, fromCol){
  dragSrc = { type:'field', uid:u, fromSecId, fromRow, fromCol };
  e.dataTransfer.effectAllowed = 'move';
  setBlankDragImage(e);
  const f = hdrFindField(u); if(!f) return;
  showGhost(f.label, gc(f.compId).icon);
  setTimeout(()=>{
    document.querySelector(`.field-card[data-uid="${u}"]`)?.classList.add('field-dragging');
  }, 0);
}

function onDragEnd(){
  dragSrc = null; dragFtrColCid = null; hideGhost();
  document.querySelectorAll('.is-dragging,.field-dragging').forEach(el=>el.classList.remove('is-dragging','field-dragging'));
  document.querySelectorAll('.drag-over,.drop-tgt').forEach(el=>el.classList.remove('drag-over','drop-tgt'));
  document.querySelectorAll('.row-drop-ind.active').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.ftr-col-th.col-drag-over').forEach(el=>el.classList.remove('col-drag-over'));
}

/* ── global dragover: ghost + row indicators ─────────────── */
document.addEventListener('dragover', e=>{
  updateGhost(e);
  if(!dragSrc) return;
  /* row drop indicators – only for header field drag */
  if(dragSrc.type==='field'){
    document.querySelectorAll('.row-drop-ind').forEach(el=>el.classList.remove('active'));
    const inds = [...document.querySelectorAll('.row-drop-ind')];
    let best=null, bestD=Infinity;
    inds.forEach(ind=>{
      const r=ind.getBoundingClientRect();
      const d=Math.abs(e.clientY-r.top);
      if(d<bestD){ bestD=d; best=ind; }
    });
    if(best && bestD<48) best.classList.add('active');
  }
});

/* ═══════════════════════════════════════════════════════════════
   SHARED HELPERS (identical to original)
═══════════════════════════════════════════════════════════════ */
function setBlankDragImage(e){
  const img=new Image();
  img.src='data:image/gif;base64,R0lGODlhAQABAIAAAAUEBAAAACwAAAAAAQABAAACAkQBADs=';
  e.dataTransfer.setDragImage(img,0,0);
}
function showGhost(label, iconHtml){
  document.getElementById('gLabel').textContent=label;
  document.getElementById('gIcon').innerHTML=iconHtml;
  document.getElementById('ghost').style.display='flex';
}
function hideGhost(){ document.getElementById('ghost').style.display='none'; }
function updateGhost(e){
  const g=document.getElementById('ghost');
  if(g.style.display==='flex'){ g.style.left=(e.clientX+14)+'px'; g.style.top=(e.clientY+10)+'px'; }
}

let _tt;
function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'),2400);
}

/* ═══════════════════════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════════════════════ */
renderComps();
renderHeader();
renderBody();
renderFooter();
renderProps();
</script>
</body>
</html>
